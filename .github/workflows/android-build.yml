name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run format check
        run: npm run format:check

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Nitro native bindings
        run: npx nitrogen node_modules/munim-bluetooth --config node_modules/munim-bluetooth/nitro.json --out node_modules/munim-bluetooth/nitrogen/generated

      - name: Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: Build for Android
        run: cd android && ./gradlew assembleRelease
