name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Generate Nitro native bindings
        run: npx nitrogen node_modules/munim-bluetooth --config node_modules/munim-bluetooth/nitro.json --out node_modules/munim-bluetooth/nitrogen/generated

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: gem install cocoapods

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}

      - name: Install iOS dependencies
        working-directory: ios
        run: pod install

      - name: Build for iOS
        working-directory: ios
        run: |
          xcodebuild \
            -workspace hullsandhellfire.xcworkspace \
            -scheme hullsandhellfire \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
